<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KaliWeb OS Pro</title>
<style>
  :root{
    --kali-bg:#0a0e14;
    --kali-panel:#14181f;
    --kali-accent:#367bf0;
    --kali-green:#3fb950;
    --kali-text:#d6deeb;
    --kali-muted:#7d8590;
    --win-border:#2a2f3a;
    --danger:#f85149;
    --warning:#e2a93a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; overflow:hidden;}
  body{
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg,#0a0e14 0%, #11151c 60%, #1a2230 100%);
    color: var(--kali-text);
    height:100vh;
    position:relative;
    user-select:none;
  }
  #desktop{
    position:absolute; top:40px; left:0; right:0; bottom:0;
    overflow:hidden;
  }
  /* Smooth transitions */
  * {
    transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
  }
  /* taskbar */
  #taskbar{
    position:absolute; left:0; right:0; top:0; height:40px;
    background: rgba(20, 24, 31, 0.95);
    border-bottom:1px solid var(--win-border);
    display:flex; align-items:center; padding:0 12px; gap:12px;
    z-index:5000;
    backdrop-filter:blur(10px);
  }
  .taskbar-btn{
    background:transparent; border:none; color:var(--kali-text);
    cursor:pointer; padding:8px 12px; border-radius:4px; font-size:13px;
    transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  .taskbar-btn:hover{
    background:rgba(255,255,255,0.1);
    transform:scale(1.05);
  }
  .taskbar-btn:active{
    background:rgba(255,255,255,0.15);
    transform:scale(0.95);
  }
  #taskbar-search { display:flex; align-items:center; gap:6px; margin-left:20px; flex:1; max-width:300px; }
  #appSearch { background:transparent; border:none; outline:none; color:var(--kali-text); font-size:13px; flex:1; padding:6px; }
  #appSearch::placeholder { color:var(--kali-muted); }
  #taskbar .clock{ font-size:12px; color:var(--kali-muted); font-family:monospace; }
  .sys-tray{ display:flex; gap:8px; margin-left:auto; align-items:center; }
  .sys-icon{ font-size:16px; cursor:pointer; opacity:0.7; transition:opacity 0.2s; }
  .sys-icon:hover{ opacity:1; }
  .sys-stat{ font-size:11px; color:var(--kali-muted); font-family:monospace; }
  .taskbtn{
    background:#1e242e; border:1px solid var(--win-border);
    color:var(--kali-text); font-size:12px; padding:5px 12px;
    border-radius:4px; cursor:pointer; transition:all 0.2s;
  }
  .taskbtn:hover { border-color:var(--kali-accent); }
  .taskbtn.active{ border-color: var(--kali-accent); background:rgba(54,123,240,0.1); }
  #taskbar-pins{ display:flex; align-items:center; gap:6px; }
  .pin-btn{ width:32px; height:32px; border-radius:8px; border:1px solid transparent; background:rgba(255,255,255,0.06); color:var(--kali-text); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .pin-btn:hover{ border-color:var(--kali-accent); background:rgba(54,123,240,0.12); }
  #desktopIcons{ position:absolute; top:20px; left:20px; display:grid; grid-template-columns:repeat(auto-fit, minmax(100px, auto)); gap:14px; z-index:100; }
  .desktop-icon{ width:100px; padding:10px; border-radius:12px; background:rgba(10,14,20,0.7); border:1px solid rgba(255,255,255,0.08); color:var(--kali-text); text-align:center; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; transition:transform 0.2s, background 0.2s; }
  .desktop-icon:hover{ transform:translateY(-2px); background:rgba(255,255,255,0.12); }
  .desktop-icon .icon-label{ font-size:28px; }
  .desktop-icon .icon-title{ font-size:12px; color:var(--kali-muted); }
  /* app launcher */
  #activitiesMenu{
    position:fixed; top:40px; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85);
    display:none; z-index:4999; flex-direction:column; overflow:hidden;
    animation: slideDown 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
  #activitiesMenu > div { padding:20px; flex:1; overflow-y:auto; }
  .app-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(100px,1fr)); gap:12px; }
  .app-icon{
    display:flex; flex-direction:column; align-items:center; gap:8px;
    cursor:pointer; padding:12px; border-radius:8px; text-align:center;
    transition:all 0.2s; color:var(--kali-text);
  }
  .app-icon:hover{ background:rgba(255,255,255,0.08); transform:scale(1.05); }
  .app-icon .ico{ font-size:32px; display:block; }
  .app-icon span{ font-size:12px; }
  .app-section-title{ font-size:14px; color:var(--kali-muted); margin-bottom:12px; text-transform:uppercase; letter-spacing:1px; }
  /* windows */
  .win{
    position:absolute;
    background: var(--kali-panel);
    border:1px solid var(--win-border);
    border-radius:8px;
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
    min-width:320px; min-height:200px;
    display:flex; flex-direction:column;
    overflow:hidden;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
  .titlebar{
    background:#1c222c; height:34px; display:flex; align-items:center;
    padding:0 10px; cursor:move; border-bottom:1px solid var(--win-border);
    font-size:13px; font-weight:500; gap:8px;
  }
  .titlebar .ttl-icon{ font-size:15px; }
  .titlebar .spacer{ flex:1; }
  .winbtn{
    width:14px; height:14px; border-radius:50%; cursor:pointer; border:none;
    transition:all 0.2s;
  }
  .winbtn:hover{ transform:scale(1.2); }
  .winbtn.close{ background:#ff5f56; }
  .winbtn.min{ background:#ffbd2e; }
  .winbtn.max{ background:#27c93f; }
  .wincontent{
    flex:1; overflow:auto; padding:12px; font-size:13px;
  }
  /* terminal */
  .term{
    background:#0d1117; color:#9ef79e; font-family:'Consolas','Courier New',monospace;
    font-size:13px; height:100%; padding:8px; overflow-y:auto;
  }
  .term .line{ white-space:pre-wrap; word-break:break-all; animation:fadeIn 0.2s; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .term .prompt{ color:#58a6ff; }
  .term input{
    background:transparent; border:none; outline:none; color:#9ef79e;
    font-family:inherit; font-size:13px; flex:1;
  }
  .term-row{ display:flex; align-items:center; }
  /* form elements */
  .field-row{ display:flex; gap:8px; margin-bottom:8px; align-items:center; flex-wrap:wrap; }
  textarea, input[type=text], input[type=color], select{
    background:#0d1117; color:var(--kali-text); border:1px solid var(--win-border);
    border-radius:4px; padding:6px 8px; font-size:13px; font-family:inherit;
    transition:all 0.2s;
  }
  textarea:focus, input:focus, select:focus {
    border-color:var(--kali-accent); box-shadow:0 0 0 2px rgba(54,123,240,0.1);
  }
  textarea{ width:100%; min-height:80px; resize:vertical; font-family:monospace; }
  button.btn{
    background:var(--kali-accent); color:#fff; border:none; border-radius:4px;
    padding:6px 14px; font-size:13px; cursor:pointer;
    transition:all 0.2s;
  }
  button.btn:hover{ filter:brightness(1.1); transform:translateY(-2px); }
  button.btn:active{ transform:translateY(0); }
  button.btn.secondary{ background:#2a2f3a; }
  .out-box{
    background:#0d1117; border:1px solid var(--win-border); border-radius:4px;
    padding:8px; font-family:monospace; font-size:12px; word-break:break-all;
    min-height:24px; margin-top:6px; white-space:pre-wrap;
  }
  .hash-row{ display:flex; justify-content:space-between; gap:8px; padding:4px 0; border-bottom:1px solid var(--win-border); font-family:monospace; font-size:12px; }
  .hash-row span.label{ color:var(--kali-muted); width:70px; }
  .hash-row span.val{ flex:1; word-break:break-all; }
  /* dashboard */
  .dashboard-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:12px; }
  .stat-card{
    background:rgba(54,123,240,0.1); border:1px solid var(--kali-accent); border-radius:8px;
    padding:16px; text-align:center; animation:fadeIn 0.5s;
  }
  .stat-value{ font-size:28px; font-weight:bold; color:var(--kali-accent); }
  .stat-label{ font-size:12px; color:var(--kali-muted); margin-top:4px; }
  /* notifications */
  .notification{
    position:fixed; bottom:20px; right:20px; background:#1e242e; border:1px solid var(--win-border);
    border-radius:6px; padding:12px 16px; color:var(--kali-text);
    animation:slideInRight 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index:6000;
  }
  @keyframes slideInRight { from { opacity:0; transform:translateX(100px); } to { opacity:1; transform:translateX(0); } }
  .notification.success{ border-color:var(--kali-green); }
  .notification.error{ border-color:var(--danger); }
  .notification.warning{ border-color:var(--warning); }
  /* scrollbar */
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#2a2f3a; border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover{ background:#3a4050; }

  @media (max-width: 1100px) {
    .win{ min-width:260px; min-height:220px; }
    .dashboard-grid{ grid-template-columns:1fr 1fr; }
    .skill{ min-width:120px; }
    .app-grid{ grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); }
  }

  @media (max-width: 800px) {
    #taskbar{ flex-wrap:wrap; height:auto; padding:10px; gap:10px; }
    #taskbar-search{ flex:1 1 100%; max-width:none; margin-left:0; }
    #taskbar-items{ flex:1 1 100%; justify-content:flex-start; flex-wrap:wrap; gap:6px; }
    .sys-tray{ width:100%; justify-content:space-between; gap:10px; margin-top:8px; }
    .desktop-icon{ width:calc(50vw - 24px); min-width:auto; }
    #desktopIcons{ top:auto; bottom:80px; left:10px; right:10px; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); }
    .field-row{ flex-direction:column; align-items:stretch; }
    textarea, input[type=text], input[type=color], select, button.btn{ width:100%; }
    .app-icon{ padding:10px; }
    .stat-card{ padding:14px; }
    .stat-value{ font-size:24px; }
    .stat-label{ font-size:11px; }
    .titlebar{ flex-wrap:wrap; gap:6px; }
    .titlebar .spacer{ flex:1 1 100%; }
    .titlebar span{ min-width:0; }
  }

  @media (max-width: 520px) {
    #taskbar{ padding:8px; gap:8px; }
    .taskbar-btn{ padding:6px 10px; font-size:12px; }
    .pin-btn{ width:28px; height:28px; font-size:14px; }
    .desktop-icon{ width:calc(50vw - 20px); padding:8px; }
    #taskbar-search{ margin-left:0; }
    #taskbar .clock{ font-size:11px; }
    .term{ font-size:12px; }
    .win{ min-width:240px; min-height:200px; }
    .app-grid{ gap:10px; }
    .dashboard-grid{ grid-template-columns:1fr; }
    .wincontent{ padding:10px; }
    .notification{ right:10px; left:10px; bottom:10px; }
  }
</style>
</head>
<body>

<div id="desktop">
  <div id="windows"></div>
  <div id="desktopIcons"></div>
</div>

<div id="taskbar">
  <button id="activitiesBtn" class="taskbar-btn" style="font-weight:600; font-size:14px; padding:0 16px;">⌗ Activities</button>
  <div id="taskbar-search" style="display:flex; align-items:center; gap:6px; margin-left:20px; flex:1; max-width:300px;">
    <i class="ti ti-search" style="color:var(--kali-muted); font-size:16px;"></i>
    <input type="text" id="appSearch" placeholder="Search apps...">
  </div>
  <div id="taskbar-pins" style="display:flex; align-items:center; gap:6px;"></div>
  <div id="taskbar-items" style="display:flex; gap:8px;"></div>
  <div class="sys-tray">
    <span class="sys-stat" id="cpuStat">CPU: 0%</span>
    <span class="sys-stat" id="memStat">MEM: 0%</span>
    <span class="sys-icon" id="wallpaperBtn" title="Wallpapers">🖼️</span>
    <span class="sys-icon" id="settingsBtn" title="Settings">⚙️</span>
    <span class="sys-icon" id="powerBtn" title="Power">🔌</span>
    <div class="clock" id="clock">00:00</div>
  </div>
  <button id="showAppsBtn" class="taskbar-btn" style="padding:0 12px;" title="Show all apps">⊞</button>
</div>

<!-- Activities/App Launcher Menu -->
<div id="activitiesMenu">
  <div style="padding:20px; flex:1; overflow-y:auto;">
    <div style="margin-bottom:20px;">
      <div class="app-section-title">Pinned</div>
      <div id="frequentApps" class="app-grid"></div>
    </div>
    <div>
      <div class="app-section-title">All Applications</div>
      <div id="allAppsList" class="app-grid"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
/* ===================== App Definitions ===================== */
const APP_DEFS = {
  dashboard: {title:'Dashboard', icon:'📊', w:900, h:600, build: buildDashboard},
  portfolio: {title:'Portfolio', icon:'💼', w:900, h:600, build: buildPortfolio},
  terminal: {title:'Terminal', icon:'▶_', w:640, h:380, build: buildTerminal},
  browser: {title:'Browser', icon:'🌐', w:780, h:500, build: buildBrowser},
  
  hash: {title:'Hash Tool', icon:'#', w:480, h:420, build: buildHash},
  encode: {title:'Encode/Decode', icon:'⇄', w:480, h:420, build: buildEncode},
  
  netinfo: {title:'Network Info', icon:'🌐', w:460, h:380, build: buildNetInfo},
  portscan: {title:'Port Scanner', icon:'📡', w:460, h:420, build: buildPortScan},
  whois: {title:'Whois Lookup', icon:'🔍', w:500, h:420, build: buildWhois},
  dnslookup: {title:'DNS Lookup', icon:'📋', w:480, h:380, build: buildDnsLookup},
  ssl: {title:'SSL Certificate', icon:'🔒', w:520, h:420, build: buildSSL},
  traceroute: {title:'Traceroute', icon:'🛣️', w:480, h:380, build: buildTraceroute},
  
  nikto: {title:'Nikto Scanner', icon:'🔎', w:540, h:440, build: buildNikto},
  dirbuster: {title:'Dir Buster', icon:'📂', w:500, h:420, build: buildDirbuster},
  sqlmap: {title:'SQLmap Simulator', icon:'💾', w:520, h:440, build: buildSQLmap},
  hydra: {title:'Hydra Cracker', icon:'🔐', w:500, h:420, build: buildHydra},
  hashcat: {title:'Hashcat Sim', icon:'⚡', w:520, h:420, build: buildHashcat},
  
  metasploit: {title:'Metasploit Info', icon:'💣', w:560, h:460, build: buildMetasploit},
  payloadgen: {title:'Payload Generator', icon:'💥', w:540, h:460, build: buildPayloadGen},
  reverseshell: {title:'Reverse Shell Gen', icon:'🐚', w:560, h:480, build: buildReverseShell},
  
  vuln: {title:'Vuln Scanner', icon:'⚠️', w:480, h:420, build: buildVuln},
  subdomain: {title:'Subdomain Enum', icon:'🔐', w:500, h:380, build: buildSubdomain},
  sniffer: {title:'Packet Sniffer', icon:'📊', w:580, h:420, build: buildSniffer},
  burp: {title:'Burp Suite Sim', icon:'🔧', w:640, h:500, build: buildBurp},
  aircrack: {title:'Aircrack Sim', icon:'📶', w:520, h:420, build: buildAircrack},
  
  jsonbeauty: {title:'JSON Tool', icon:'{}', w:600, h:420, build: buildJsonBeauty},
  regex: {title:'Regex Tester', icon:'\\\\', w:580, h:420, build: buildRegex},
  qrgen: {title:'QR Code', icon:'⬜', w:420, h:420, build: buildQRGen},
  colorpick: {title:'Color Converter', icon:'🎨', w:420, h:320, build: buildColorPicker},
  wordlist: {title:'Wordlist Gen', icon:'📖', w:480, h:420, build: buildWordlist},
  sqli: {title:'SQLi Tester', icon:'🛡️', w:520, h:420, build: buildSQLi},
  
  files: {title:'File Manager', icon:'📁', w:560, h:380, build: buildFiles},
  notes: {title:'Notes', icon:'📝', w:460, h:380, build: buildNotes},
  passgen: {title:'Password Gen', icon:'🔑', w:440, h:340, build: buildPassgen},
  settings: {title:'Settings', icon:'⚙️', w:500, h:480, build: buildSettings},
  contact: {title:'Contact', icon:'✉️', w:600, h:460, build: buildContact},
};

/* ===================== Window Manager ===================== */
let zTop = 100, winCount = 0;
const windowsEl = document.getElementById('windows');
const taskbarItems = document.getElementById('taskbar-items');
const taskbarPins = document.getElementById('taskbar-pins');
const desktopIcons = document.getElementById('desktopIcons');
const openWindows = {};
let appSearch = null;
const wallpaperList = [
  {id:'default', label:'Default', css:'linear-gradient(135deg,#0a0e14 0%, #11151c 60%, #1a2230 100%)'},
  {id:'nebula', label:'Nebula', css:'radial-gradient(circle at top left, #3b82f6, #0f172a 60%, #020617 100%)'},
  {id:'sunset', label:'Sunset', css:'linear-gradient(135deg, #ff5f6d 0%, #ffc371 100%)'},
  {id:'matrix', label:'Matrix', css:'linear-gradient(135deg, #020b0b 0%, #091921 100%), repeating-linear-gradient(0deg, rgba(0,255,128,0.05), rgba(0,255,128,0.05) 1px, transparent 1px, transparent 2px)'}
];
let currentWallpaper = localStorage.getItem('kaliWallpaper') || 'default';
let pinnedTaskbar = JSON.parse(localStorage.getItem('kaliPinnedTaskbar') || '["dashboard","terminal","browser"]');
let pinnedDesktop = JSON.parse(localStorage.getItem('kaliPinnedDesktop') || '["portfolio","browser"]');

function openApp(id){
  if(openWindows[id]){
    focusWin(openWindows[id].el);
    openWindows[id].el.style.display='flex';
    setTaskActive(id,true);
    return;
  }
  const def = APP_DEFS[id];
  if(!def) return;
  winCount++;
  const offset = (winCount % 6) * 24;
  const win = document.createElement('div');
  win.className = 'win';
  const maxWidth = Math.min(def.w, window.innerWidth - 32);
  const maxHeight = Math.min(def.h, window.innerHeight - 72);
  const left = window.innerWidth <= 640 ? 16 : 60 + offset;
  const top = window.innerWidth <= 640 ? 56 : 40 + offset;
  win.style.width = maxWidth + 'px';
  win.style.height = maxHeight + 'px';
  win.style.left = left + 'px';
  win.style.top = top + 'px';
  win.style.zIndex = ++zTop;

  win.innerHTML = `
    <div class="titlebar">
      <span class="ttl-icon">${def.icon}</span>
      <span>${def.title}</span>
      <span class="spacer"></span>
      <button class="winbtn min" title="Minimize"></button>
      <button class="winbtn max" title="Maximize"></button>
      <button class="winbtn close" title="Close"></button>
    </div>
    <div class="wincontent" id="content-${id}"></div>
  `;
  windowsEl.appendChild(win);
  openWindows[id] = {el: win, maximized:false, prevRect:null};

  def.build(win.querySelector('.wincontent'), win);

  // dragging
  const titlebar = win.querySelector('.titlebar');
  let dragging=false, sx,sy, ox,oy;
  titlebar.addEventListener('mousedown', e=>{
    if(e.target.classList.contains('winbtn')) return;
    dragging=true; sx=e.clientX; sy=e.clientY;
    ox=win.offsetLeft; oy=win.offsetTop;
    focusWin(win);
  });
  document.addEventListener('mousemove', e=>{
    if(!dragging) return;
    win.style.left = (ox + e.clientX - sx)+'px';
    win.style.top = (oy + e.clientY - sy)+'px';
  });
  document.addEventListener('mouseup', ()=> dragging=false);

  win.addEventListener('mousedown', ()=> focusWin(win));

  // buttons
  win.querySelector('.close').onclick = ()=>{
    win.remove();
    delete openWindows[id];
    removeTaskbtn(id);
  };
  win.querySelector('.min').onclick = ()=>{
    win.style.display='none';
    setTaskActive(id,false);
  };
  win.querySelector('.max').onclick = ()=>{
    const o = openWindows[id];
    if(!o.maximized){
      o.prevRect = {l:win.style.left,t:win.style.top,w:win.style.width,h:win.style.height};
      win.style.left='0px'; win.style.top='40px';
      win.style.width='100%'; win.style.height='calc(100% - 40px)';
      o.maximized=true;
    } else {
      win.style.left=o.prevRect.l; win.style.top=o.prevRect.t;
      win.style.width=o.prevRect.w; win.style.height=o.prevRect.h;
      o.maximized=false;
    }
  };

  addTaskbtn(id, def);
  focusWin(win);
}

function focusWin(win){
  win.style.zIndex = ++zTop;
  win.style.display='flex';
  document.querySelectorAll('.taskbtn').forEach(b=>b.classList.remove('active'));
  for(const id in openWindows){
    if(openWindows[id].el===win) setTaskActive(id,true);
  }
}

function addTaskbtn(id, def){
  const b = document.createElement('div');
  b.className='taskbtn active';
  b.id='task-'+id;
  b.innerHTML = `${def.icon} ${def.title}`;
  b.onclick = ()=>{
    const w = openWindows[id].el;
    if(w.style.display==='none'){ w.style.display='flex'; focusWin(w); }
    else { focusWin(w); }
  };
  taskbarItems.appendChild(b);
}

function removeTaskbtn(id){
  const b = document.getElementById('task-'+id);
  if(b) b.remove();
}

function saveAppState(){
  localStorage.setItem('kaliPinnedTaskbar', JSON.stringify(pinnedTaskbar));
  localStorage.setItem('kaliPinnedDesktop', JSON.stringify(pinnedDesktop));
  localStorage.setItem('kaliWallpaper', currentWallpaper);
}

function applyWallpaper(){
  const wallpaper = wallpaperList.find(w=>w.id===currentWallpaper) || wallpaperList[0];
  document.body.style.background = wallpaper.css;
}

function renderTaskbarPins(){
  if(!taskbarPins) return;
  taskbarPins.innerHTML = '';
  pinnedTaskbar.forEach(id=>{
    const def = APP_DEFS[id];
    if(!def) return;
    const btn = document.createElement('button');

    btn.title = `Open ${def.title}`;
    btn.innerHTML = def.icon;

    taskbarPins.appendChild(btn);
  });
}

function renderDesktopIcons(){
  if(!desktopIcons) return;
  desktopIcons.innerHTML = '';
  pinnedDesktop.forEach(id=>{
    const def = APP_DEFS[id];
    if(!def) return;
    const icon = document.createElement('div');
    icon.className = 'desktop-icon';
    icon.innerHTML = `<div class="icon-label">${def.icon}</div><div class="icon-title">${def.title}</div>`;
    icon.onclick = ()=>openApp(id);
    desktopIcons.appendChild(icon);
  });
}

function togglePin(id, target){
  if(target==='taskbar'){
    const idx = pinnedTaskbar.indexOf(id);
    if(idx === -1) pinnedTaskbar.push(id);
    else pinnedTaskbar.splice(idx,1);
  } else if(target==='desktop'){
    const idx = pinnedDesktop.indexOf(id);
    if(idx === -1) pinnedDesktop.push(id);
    else pinnedDesktop.splice(idx,1);
  }
  saveAppState();
  renderTaskbarPins();
  renderDesktopIcons();
  if(window.updateAppLauncher) window.updateAppLauncher(appSearch ? appSearch.value.toLowerCase() : '');
}

function isPinned(id, target){
  return target==='taskbar' ? pinnedTaskbar.includes(id) : pinnedDesktop.includes(id);
}

function setTaskActive(id, val){
  const b = document.getElementById('task-'+id);
  if(!b) return;
  document.querySelectorAll('.taskbtn').forEach(x=>x.classList.remove('active'));
  if(val) b.classList.add('active');
}

function showNotification(msg, type='success'){
  const n = document.createElement('div');
  n.className = 'notification '+type;
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(()=> n.remove(), 3000);
}

/* ===================== Activities/App Launcher ===================== */
function initLauncher(){
  const activitiesBtn = document.getElementById('activitiesBtn');
  const showAppsBtn = document.getElementById('showAppsBtn');
  const menu = document.getElementById('activitiesMenu');
  appSearch = document.getElementById('appSearch');
  const frequentApps = document.getElementById('frequentApps');
  const allApps = document.getElementById('allAppsList');

  const appList = Object.entries(APP_DEFS).map(([id, def])=>({
    id, title: def.title, icon: def.icon || '⚙️'
  })).sort((a,b)=>a.title.localeCompare(b.title));

  const frequent = ['dashboard','portfolio','terminal','browser','hash','encode','netinfo','portscan'];

  function renderApps(filter=''){
    frequentApps.innerHTML='';
    allApps.innerHTML='';
    
    const freq = appList.filter(a=>frequent.includes(a.id) && a.title.toLowerCase().includes(filter));
    freq.forEach(a=>{
      const el = createAppIcon(a);
      frequentApps.appendChild(el);
    });

    const all = appList.filter(a=>!frequent.includes(a.id) && a.title.toLowerCase().includes(filter));
    all.forEach(a=>{
      const el = createAppIcon(a);
      allApps.appendChild(el);
    });
  }

  function createAppIcon(app){
    const div = document.createElement('div');
    div.className='app-icon';
    div.innerHTML = `<span class="ico">${app.icon}</span><span>${app.title}</span><div style="display:flex; gap:4px; margin-top:8px; justify-content:center;"><button class="pin-btn" title="Toggle taskbar pin">${isPinned(app.id,'taskbar') ? '📌' : '📍'}</button><button class="pin-btn" title="Toggle desktop pin">${isPinned(app.id,'desktop') ? '🖥️' : '🗂️'}</button></div>`;
    const pinButtons = div.querySelectorAll('.pin-btn');
    pinButtons[0].onclick = e=>{ e.stopPropagation(); togglePin(app.id, 'taskbar'); };
    pinButtons[1].onclick = e=>{ e.stopPropagation(); togglePin(app.id, 'desktop'); };
    div.onclick = ()=>{
      openApp(app.id);
      menu.style.display='none';
      appSearch.value='';
      renderApps();
    };
    return div;
  }

  function toggle(){
    menu.style.display = menu.style.display==='none' ? 'flex' : 'none';
    appSearch.value='';
    renderApps();
    appSearch.focus();
  }

  activitiesBtn.onclick = toggle;
  showAppsBtn.onclick = toggle;
  
  appSearch.addEventListener('input', e=>{
    renderApps(e.target.value.toLowerCase());
  });

  appSearch.addEventListener('keydown', e=>{
    if(e.key==='Escape') menu.style.display='none';
  });

  document.addEventListener('click', e=>{
    if(!menu.contains(e.target) && !activitiesBtn.contains(e.target) && !showAppsBtn.contains(e.target)){
      menu.style.display='none';
    }
  });

  renderApps();
}

function buildTerminal(container){
  container.innerHTML = `<div class="term" id="termOut"></div>`;
  const out = container.querySelector('#termOut');
  let cwd = '/home/user';
  const history = [];
  let historyIndex = null;

  const fs = {
    '/': { type: 'dir', children: {
      home: { type: 'dir', children: {
        user: { type: 'dir', children: {
          'notes.txt': { type: 'file', content: 'Welcome to KaliWeb OS Pro Notes\nThis is a simulated Linux terminal with real shell commands.\n' },
          projects: { type: 'dir', children: {
            'readme.txt': { type: 'file', content: 'This folder contains portfolio project notes.\n' }
          } }
        } }
      } },
      etc: { type: 'dir', children: {
        'motd': { type: 'file', content: 'KaliWeb OS Pro - simulated shell environment.\n' }
      } },
      bin: { type: 'dir', children: {} },
      usr: { type: 'dir', children: {} },
    } }
  };

  const commands = ['help','clear','pwd','ls','cd','cat','echo','mkdir','touch','rm','sudo','uname','whoami','date','neofetch','apps','open','history','man','ping','nmap','base64','hashgen'];

  function printLine(html){
    const d = document.createElement('div');
    d.className = 'line';
    d.innerHTML = html;
    out.appendChild(d);
    out.scrollTop = out.scrollHeight;
  }

  function promptStr(){ return `<span class="prompt">user@kali</span>:<span style="color:#f0993a">${cwd}</span>$ `; }

  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function resolvePath(path){
    if(!path) return cwd;
    let parts = path.startsWith('/') ? path.split('/') : (cwd + '/' + path).split('/');
    const clean = [];
    for(const part of parts){
      if(part === '' || part === '.') continue;
      if(part === '..'){ if(clean.length > 0) clean.pop(); continue; }
      clean.push(part);
    }
    return '/' + clean.join('/');
  }

  function getNode(path){
    const resolved = resolvePath(path);
    if(resolved === '/') return fs['/'];
    const parts = resolved.slice(1).split('/');
    let node = fs['/'];
    for(const part of parts){
      if(!node || node.type !== 'dir' || !node.children[part]) return null;
      node = node.children[part];
    }
    return node;
  }

  function setNode(path, value){
    const resolved = resolvePath(path);
    const parts = resolved.slice(1).split('/');
    const name = parts.pop();
    const parent = getNode('/' + parts.join('/'));
    if(!parent || parent.type !== 'dir') return false;
    parent.children[name] = value;
    return true;
  }

  function removeNode(path){
    const resolved = resolvePath(path);
    const parts = resolved.slice(1).split('/');
    const name = parts.pop();
    const parent = getNode('/' + parts.join('/'));
    if(!parent || parent.type !== 'dir' || !parent.children[name]) return false;
    delete parent.children[name];
    return true;
  }

  function formatListing(node){
    if(!node || node.type !== 'dir') return '';
    return Object.entries(node.children).map(([name, item]) => {
      const prefix = item.type === 'dir' ? '<span style="color:#58a6ff;">d</span>' : '<span style="color:#3fb950;">-</span>';
      return `${prefix} ${name}`;
    }).join('<br>');
  }

  function newInputRow(){
    const row = document.createElement('div');
    row.className = 'term-row line';
    row.innerHTML = `${promptStr()}<input type="text" autocomplete="off" spellcheck="false">`;
    out.appendChild(row);
    const input = row.querySelector('input');
    input.focus();

    input.addEventListener('keydown', e=>{
      if(e.key === 'Enter'){
        const cmd = input.value;
        row.innerHTML = `${promptStr()}${escapeHtml(cmd)}`;
        runCmd(cmd);
      } else if(e.key === 'ArrowUp' || e.key === 'ArrowDown'){
        if(history.length === 0) return;
        if(historyIndex === null) historyIndex = history.length;
        historyIndex += e.key === 'ArrowUp' ? -1 : 1;
        if(historyIndex < 0) historyIndex = 0;
        if(historyIndex >= history.length) historyIndex = history.length - 1;
        input.value = history[historyIndex] || '';
      } else if(e.key === 'Tab'){
        e.preventDefault();
        const cursor = input.selectionStart;
        const value = input.value;
        const prefix = value.slice(0, cursor);
        const parts = prefix.split(/\s+/);
        const last = parts.pop();
        const completion = commands.concat(Object.keys(APP_DEFS)).find(cmd => cmd.startsWith(last));
        if(completion) input.value = prefix.slice(0, prefix.length - last.length) + completion + value.slice(cursor);
      }
    });
    out.scrollTop = out.scrollHeight;
  }

  const HELP = `Available commands:\n  help            show this help\n  ls [path]       list directory\n  pwd             print current directory\n  cd <path>       change directory\n  cat <file>      show file contents\n  echo <text>     echo text\n  mkdir <name>    create folder\n  touch <name>    create file\n  rm <name>       remove file or empty directory\n  clear           clear screen\n  whoami          show user\n  uname -a        show system info\n  date            show date/time\n  neofetch        system info\n  apps            list GUI apps\n  open <app>      launch app\n  history         show past commands\n  man <command>   view manual page\n  ping <host>     simulate ping\n  nmap <host>     simulate port scan\n  base64          encode/decode base64\n  hashgen         generate a sample hash`;

  function runCmd(raw){
    const cmd = raw.trim();
    if(cmd) history.push(cmd);
    historyIndex = null;
    const [name, ...rest] = cmd.split(/\s+/);
    const arg = rest.join(' ');

    switch(name){
      case 'help': printLine(HELP.replace(/\n/g,'<br>')); break;
      case 'clear': out.innerHTML = ''; break;
      case 'pwd': printLine(cwd); break;
      case 'ls': {
        const target = arg || '.';
        const node = getNode(target);
        if(!node) printLine(`ls: cannot access '${escapeHtml(target)}': No such file or directory`);
        else if(node.type !== 'dir') printLine(`ls: cannot open '${escapeHtml(target)}': Not a directory`);
        else printLine(formatListing(node));
        break;
      }
      case 'cd': {
        const target = arg || '/home/user';
        const node = getNode(target);
        if(!node) printLine(`bash: cd: ${escapeHtml(target)}: No such file or directory`);
        else if(node.type !== 'dir') printLine(`bash: cd: ${escapeHtml(target)}: Not a directory`);
        else cwd = resolvePath(target);
        break;
      }
      case 'cat': {
        if(!arg){ printLine('cat: missing file operand'); break; }
        const node = getNode(arg);
        if(!node) printLine(`cat: ${escapeHtml(arg)}: No such file or directory`);
        else if(node.type !== 'dir') printLine(escapeHtml(node.content));
        else printLine(`cat: ${escapeHtml(arg)}: Is a directory`);
        break;
      }
      case 'echo': printLine(escapeHtml(arg)); break;
      case 'mkdir': {
        if(!arg){ printLine('mkdir: missing operand'); break; }
        const result = setNode(arg, { type:'dir', children:{} });
        if(!result) printLine(`mkdir: cannot create directory '${escapeHtml(arg)}': No such file or directory`);
        break;
      }
      case 'touch': {
        if(!arg){ printLine('touch: missing file operand'); break; }
        const result = setNode(arg, { type:'file', content:'' });
        if(!result) printLine(`touch: cannot touch '${escapeHtml(arg)}': No such file or directory`);
        break;
      }
      case 'rm': {
        if(!arg){ printLine('rm: missing operand'); break; }
        const target = resolvePath(arg);
        const node = getNode(target);
        if(!node){ printLine(`rm: cannot remove '${escapeHtml(arg)}': No such file or directory`); break; }
        if(node.type === 'dir' && Object.keys(node.children).length > 0){ printLine(`rm: cannot remove '${escapeHtml(arg)}': Directory not empty`); break; }
        removeNode(arg);
        break;
      }
      case 'sudo': printLine('sudo: a password is required\nSorry, user is not in the sudoers file. This incident will be reported.'); break;
      case 'uname': printLine(arg === '-a' ? 'Linux kaliweb 6.6.0-kaliweb #1 SMP Fri Jun 13 2026 x86_64 GNU/Linux' : 'Linux'); break;
      case 'whoami': printLine('user'); break;
      case 'date': printLine(new Date().toString()); break;
      case 'neofetch': printLine(`<span style="color:#367bf0">\n  ██╗  ██╗ █████╗ ██╗     ██╗\n  ██║ ██╔╝██╔══██╗██║     ██║\n  █████╔╝ ███████║██║     ██║\n  ╚═██╗ ██╔══██║██║     ██║\n  ██║  ██╗██║  ██║███████╗██║\n  ╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝╚═╝\n</span>OS: KaliWeb OS Pro<br>Kernel: 6.6.0-kaliweb<br>Uptime: 1 hour 23 mins<br>Shell: bash`); break;
      case 'apps': printLine(Object.keys(APP_DEFS).sort().join(' ')); break;
      case 'open': if(APP_DEFS[arg]){ openApp(arg); printLine(`Opening ${arg}...`); } else printLine(`open: app not found: ${escapeHtml(arg)}`); break;
      case 'history': printLine(history.map((cmd,i)=>`${i+1}  ${escapeHtml(cmd)}`).join('<br>')); break;
      case 'man': {
        const manual = {
          help: 'Display this help text.',
          ls: 'List directory contents.',
          cd: 'Change directory.',
          cat: 'Display file content.',
          echo: 'Print arguments to the terminal.',
          mkdir: 'Create a new directory.',
          touch: 'Create a new file.',
          rm: 'Remove file or empty directory.',
          pwd: 'Print working directory.',
          uname: 'Display system information.',
          open: 'Launch a GUI app.',
        };
        printLine(manual[rest[0]] ? escapeHtml(manual[rest[0]]) : `No manual entry for ${escapeHtml(rest[0] || '')}`);
        break;
      }
      case 'ping': {
        const host = arg || '127.0.0.1';
        let reply = '';
        for(let i=1;i<=4;i++) reply += `64 bytes from ${escapeHtml(host)}: icmp_seq=${i} ttl=64 time=${(Math.random()*20+1).toFixed(2)} ms\n`;
        printLine(reply.trim());
        break;
      }
      case 'nmap': {
        const host = arg || '127.0.0.1';
        printLine(`Starting Nmap 7.80 ( https://nmap.org ) at ${new Date().toLocaleTimeString()}<br>Host: ${escapeHtml(host)} (host)\nPORT   STATE SERVICE<br>22/tcp open  ssh<br>80/tcp open  http<br>443/tcp open  https<br>Done.`);
        break;
      }
      case 'base64': {
        if(!arg){ printLine('base64: missing operand'); break; }
        try{ printLine(btoa(arg)); } catch(e){ printLine('base64: invalid input'); }
        break;
      }
      case 'hashgen': {
        const hash = Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
        printLine(`SHA256: ${hash}`);
        break;
      }
      case '': break;
      default: printLine(`bash: ${escapeHtml(name)}: command not found`); break;
    }
    newInputRow();
  }

  printLine(`<span style="color:#3fb950">KaliWeb OS Pro Terminal</span> - Type 'help' for commands`);
  newInputRow();
}

async function sha(algo, text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest(algo, enc);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function md5(str){
  function rotl(x,c){return (x<<c)|(x>>>(32-c));}
  function toHex(num){
    let s='', n=num;
    for(let i=0;i<4;i++){ s += (n & 0xff).toString(16).padStart(2,'0'); n >>>= 8; }
    return s;
  }
  const s=[7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];
  const K=[];
  for(let i=0;i<64;i++) K[i] = Math.floor(Math.abs(Math.sin(i+1)) * 2**32) >>> 0;

  let bytes = new TextEncoder().encode(str);
  const origLenBits = bytes.length * 8;
  let withOne = new Uint8Array(((bytes.length+8)>>6)*64 + 64);
  withOne.set(bytes);
  withOne[bytes.length] = 0x80;
  const dv = new DataView(withOne.buffer);
  dv.setUint32(withOne.length-8, origLenBits >>> 0, true);
  dv.setUint32(withOne.length-4, Math.floor(origLenBits / 2**32) >>> 0, true);

  let a0=0x67452301,b0=0xefcdab89,c0=0x98badcfe,d0=0x10325476;

  for(let chunk=0; chunk<withOne.length; chunk+=64){
    const M=[];
    for(let i=0;i<16;i++) M[i] = dv.getUint32(chunk+i*4, true);
    let A=a0,B=b0,C=c0,D=d0;
    for(let i=0;i<64;i++){
      let F,g;
      if(i<16){ F=(B&C)|(~B&D); g=i; }
      else if(i<32){ F=(D&B)|(~D&C); g=(5*i+1)%16; }
      else if(i<48){ F=B^C^D; g=(3*i+5)%16; }
      else { F=C^(B|~D); g=(7*i)%16; }
      F = (F + A + K[i] + M[g]) >>> 0;
      A=D; D=C; C=B;
      B = (B + rotl(F, s[i])) >>> 0;
    }
    a0=(a0+A)>>>0; b0=(b0+B)>>>0; c0=(c0+C)>>>0; d0=(d0+D)>>>0;
  }
  return toHex(a0)+toHex(b0)+toHex(c0)+toHex(d0);
}

function buildEncode(container){
  container.innerHTML = `
    <div class="field-row">
      <select id="encMode" style="width:100%">
        <option value="b64enc">Base64 Encode</option>
        <option value="b64dec">Base64 Decode</option>
        <option value="urlenc">URL Encode</option>
        <option value="urldec">URL Decode</option>
        <option value="hexenc">Text → Hex</option>
        <option value="hexdec">Hex → Text</option>
        <option value="rot13">ROT13</option>
      </select>
    </div>
    <div class="field-row"><textarea id="encInput" placeholder="Input..." style="flex:1;"></textarea></div>
    <div class="field-row">
      <button class="btn" id="encBtn">Convert</button>
      <button class="btn secondary" id="encCopy">Copy</button>
    </div>
    <div class="out-box" id="encOut"></div>
  `;
  const out = container.querySelector('#encOut');
  container.querySelector('#encBtn').onclick = ()=>{
    const mode = container.querySelector('#encMode').value;
    const input = container.querySelector('#encInput').value;
    let result='';
    try{
      switch(mode){
        case 'b64enc': result = btoa(unescape(encodeURIComponent(input))); break;
        case 'b64dec': result = decodeURIComponent(escape(atob(input))); break;
        case 'urlenc': result = encodeURIComponent(input); break;
        case 'urldec': result = decodeURIComponent(input); break;
        case 'hexenc': result = [...new TextEncoder().encode(input)].map(b=>b.toString(16).padStart(2,'0')).join(' '); break;
        case 'hexdec': {
          const hex = input.replace(/\s+/g,'');
          const bytes = [];
          for(let i=0;i<hex.length;i+=2) bytes.push(parseInt(hex.substr(i,2),16));
          result = new TextDecoder().decode(new Uint8Array(bytes));
          break;
        }
        case 'rot13': result = input.replace(/[a-zA-Z]/g, c=>{
          const base = c<='Z' ? 65 : 97;
          return String.fromCharCode((c.charCodeAt(0)-base+13)%26+base);
        }); break;
      }
    } catch(e){ result = 'Error: '+e.message; }
    out.textContent = result;
  };
  container.querySelector('#encCopy').onclick = ()=>{
    navigator.clipboard?.writeText(out.textContent);
  };
}
